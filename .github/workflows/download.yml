name: "Efficient Multi-Download from YouTube"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישורים (מופרדים בפסיקים)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies (If missing)
        run: |
          # בדיקת ffmpeg
          if ! command -v ffmpeg &> /dev/null; then
            echo "Installing ffmpeg..."
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            echo "ffmpeg is already installed."
          fi

          # בדיקת yt-dlp
          if ! command -v yt-dlp &> /dev/null; then
            echo "Installing yt-dlp..."
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          else
            echo "yt-dlp is already installed."
          fi

      - name: 3. Download Videos
        run: |
          mkdir -p yt_output
          
          # יצירת קובץ עוגיות (במידה והוגדר סיקרט)
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            sed -i '/^$/d' cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          FORMAT="${{ github.event.inputs.format }}"
          
          # עיבוד הקישורים: החלפת פסיקים בירידת שורה
          URLS_INPUT="${{ github.event.inputs.yt_urls }}"
          echo "$URLS_INPUT" | tr ',' '\n' > urls.txt

          # מעבר על כל קישור
          while IFS= read -r URL || [ -n "$URL" ]; do
            # ניקוי רווחים מיותרים מסביב לקישור
            CLEAN_URL=$(echo "$URL" | xargs)
            [ -z "$CLEAN_URL" ] && continue
            
            echo "Downloading: $CLEAN_URL"
            
            COMMON_ARGS="$COOKIE_ARG --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node"
            
            if [ "$FORMAT" = "mp3" ]; then
              yt-dlp $COMMON_ARGS -x --audio-format mp3 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            else
              yt-dlp $COMMON_ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            fi
          done < urls.txt
          
          [ -f cookies.txt ] && rm cookies.txt
          rm urls.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "v${{ github.run_number }}"
          name: "אוסף הורדות #${{ github.run_number }}"
          body: "כל הקבצים שבוקשו הוכנו עבורך."
          token: ${{ secrets.GITHUB_TOKEN }}
