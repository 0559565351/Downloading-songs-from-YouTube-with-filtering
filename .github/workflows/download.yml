name: "Downloading songs from YouTube with filtering"

on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download and Rename
        run: |
          mkdir -p yt_output
          
          # הגדרת עוגיות
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          sed -i '/^$/d' cookies.txt

          URL="${{ github.event.inputs.yt_urls }}"
          FORMAT="${{ github.event.inputs.format }}"

          # 1. שליפת שם השיר מהמטא-דאטה (Title)
          RAW_TITLE=$(yt-dlp --get-title --no-playlist "$URL")
          
          # 2. ניקוי תווים לא חוקיים והוספת סוגריים לשם הקובץ
          # אנחנו משאירים רק אותיות, מספרים, רווחים ומקפים כדי למנוע שגיאות
          CLEAN_TITLE=$(echo "($RAW_TITLE)" | tr -d '/\\:*?"<>|')

          echo "Downloading: $CLEAN_TITLE"

          # 3. הרצת ההורדה עם השם החדש
          ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --add-metadata"

          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp $ARGS -x --audio-format mp3 --embed-thumbnail -o "yt_output/$CLEAN_TITLE.mp3" "$URL"
          else
            yt-dlp $ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail -o "yt_output/$CLEAN_TITLE.mp4" "$URL"
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "v${{ github.run_number }}" 
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הקובץ מוכן להורדה."
          token: ${{ secrets.GITHUB_TOKEN }}
