name: "Smart Download: Single MP3 or ZIP"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישורים (מופרדים בפסיקים)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Download and Filter
        run: |
          mkdir -p yt_output
          
          # רשימת מילים אסורות (סינון מחמיר מאוד)
          BLACKLIST="זין,זיין,שמוק,כוס,פות,פותה,דגדגן,פין,ביצים,אשכים,פטמות,שדיים,ציצי,תחת,ישבן,אנאלי,וגינה,שפיכה,גמירה,מציצה,אוננות,זרע,פורנו,סקס,זנות,זונה,חשפנות,עירום,ביקיני,לנז'רי,נועה קירל,עדן בן זקן,אנה זק,אגם בוחבוט,אודיה,יסמין מועלם,שרית חדד,מירי מסיקה,קרן פלס,נטע ברזילי,ריטה,נינט,שירי מימון,עדן גולן,נטע אלחמיסטר,בר רפאלי,עדן פינס,יעל שלביה,שלומית מלכה,רותם סלע,Kim Kardashian,Kylie Jenner,Gigi Hadid,Bella Hadid,porn,sexy,nude,naked,xxx,blowjob,ass,fuck,dick"

          # המרת רשימת הקישורים למערך
          IFS=',' read -ra ADDR <<< "${{ github.event.inputs.yt_urls }}"
          
          for URL in "${ADDR[@]}"; do
            URL=$(echo $URL | xargs) # ניקוי רווחים
            [ -z "$URL" ] && continue
            
            echo "Checking: $URL"
            
            # שליפת כותרת הסרטון
            TITLE=$(yt-dlp --get-title --no-playlist "$URL" || echo "Unknown Title")
            echo "Title: $TITLE"
            
            # בדיקת סינון (עובר על כל המילים ברשימה)
            CLEAN_TITLE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]')
            IFS=',' read -ra WORDS <<< "$BLACKLIST"
            
            FORBIDDEN_FOUND=""
            for WORD in "${WORDS[@]}"; do
              WORD_LOWER=$(echo "$WORD" | tr '[:upper:]' '[:lower:]' | xargs)
              if [[ "$CLEAN_TITLE" == *"$WORD_LOWER"* ]]; then
                FORBIDDEN_FOUND="$WORD"
                break
              fi
            done
            
            if [ -n "$FORBIDDEN_FOUND" ]; then
              echo "❌ חסימה! הסרטון נחסם בגלל המילה: '$FORBIDDEN_FOUND'"
              continue
            fi
            
            # אם עבר את הסינון - מוריד
            echo "✅ מאושר להורדה."
            if [ "${{ github.event.inputs.format }}" = "mp3" ]; then
              yt-dlp --no-playlist --no-restrict-filenames --windows-filenames -x --audio-format mp3 --add-metadata -o "yt_output/%(title)s.%(ext)s" "$URL"
            else
              yt-dlp --no-playlist --no-restrict-filenames --windows-filenames -f "bestvideo+bestaudio/best" --merge-output-format mp4 -o "yt_output/%(title)s.%(ext)s" "$URL"
            fi
          done

      - name: 4. Process Output
        id: process
        run: |
          FILE_COUNT=$(ls -1 yt_output | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files to download (maybe all were filtered)."
            exit 1
          fi
          
          if [ "$FILE_COUNT" -gt 1 ]; then
            zip -r -j "songs_collection.zip" yt_output/*
            echo "FINAL_ARTIFACT=songs_collection.zip" >> $GITHUB_ENV
          else
            FILENAME=$(ls -1 yt_output | head -n 1)
            mv "yt_output/$FILENAME" .
            echo "FINAL_ARTIFACT=$FILENAME" >> $GITHUB_ENV
          fi

      - name: 5. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.FINAL_ARTIFACT }}"
          tag: "v${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הורדה מוכנה. סינון פעיל."
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
