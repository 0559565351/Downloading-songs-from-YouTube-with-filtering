name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור אחד או כמה (מופרדים ברווח)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    container:
      image: jauderho/yt-dlp:latest
    permissions: write-all
    steps:
      - name: 1. Download Multiple Videos
        run: |
          mkdir -p yt_output
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          for url in ${{ github.event.inputs.yt_urls }}; do
            echo "מוריד: $url"
            
            if [ "${{ github.event.inputs.format }}" = "mp3" ]; then
              yt-dlp --cookies cookies.txt \
                -x --audio-format mp3 \
                --embed-thumbnail \
                --add-metadata \
                -o "%(title)s.%(ext)s" \
                --paths "yt_output" \
                "$url"
            else
              yt-dlp --cookies cookies.txt \
                -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                --merge-output-format mp4 \
                --embed-thumbnail \
                --add-metadata \
                -o "%(title)s.%(ext)s" \
                --paths "yt_output" \
                "$url"
            fi
          done
          
          rm cookies.txt

      - name: 2. Prepare Artifacts
        id: prepare
        run: |
          apk add zip
          file_count=$(ls yt_output | wc -l)
          echo "מספר קבצים שהורדו: $file_count"
          
          if [ "$file_count" -eq 1 ]; then
            # אם יש רק קובץ אחד, נשתמש בנתיב הישיר שלו
            echo "file_path=yt_output/*" >> $GITHUB_OUTPUT
          else
            # אם יש כמה קבצים, נדחוס אותם לזיפ (ללא מבנה תיקיות פנימי)
            zip -j "downloads.zip" yt_output/*
            echo "file_path=downloads.zip" >> $GITHUB_OUTPUT
          fi

      - name: 3. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ steps.prepare.outputs.file_path }}"
          tag: "run-${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: |
            בוצע באמצעות: Downloading songs from YouTube with filtering
          token: ${{ secrets.GITHUB_TOKEN }}
