name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור (למשל מיוטיוב)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          # התקנת yt-dlp העדכני ביותר
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # התקנת ffmpeg
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Download Video and Extract Title
        id: download_step
        run: |
          mkdir -p yt_output
          
          # יצירת קובץ עוגיות
          cat <<EOF > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF
          sed -i '/^$/d' cookies.txt

          FORMAT="${{ github.event.inputs.format }}"
          URL="${{ github.event.inputs.yt_urls }}"
          ARGS="--cookies cookies.txt --no-playlist --extractor-args youtube:player_client=android,web --js-runtimes node"
          
          # שליפת שם השיר מיוטיוב (תומך בעברית)
          VIDEO_TITLE=$(yt-dlp $ARGS --get-title "$URL")
          echo "video_title=$VIDEO_TITLE" >> $GITHUB_OUTPUT

          if [ "$FORMAT" = "mp3" ]; then
            # הורדה ושמירה בשם השיר המקורי ביוטיוב
            yt-dlp $ARGS -x --audio-format mp3 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL"
          else
            # הורדה כ-mp4
            yt-dlp $ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata --parse-metadata "title:%(title)s" -o "yt_output/%(title)s.%(ext)s" "$URL"
          fi
          
          rm cookies.txt

      - name: 4. Create Unique Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "run-${{ github.run_number }}"
          # כותרת ה-Release עם שם השיר ומספר הריצה
          name: "${{ steps.download_step.outputs.video_title }} (#${{ github.run_number }})"
          body: "הקובץ מוכן להורדה."
          token: ${{ secrets.GITHUB_TOKEN }}
