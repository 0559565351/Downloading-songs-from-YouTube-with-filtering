name: "Smart Download: Single MP3 or ZIP"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישורים (מופרדים בפסיקים)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONIOENCODING: utf-8
      YT_COOKIES: ${{ secrets.YT_COOKIES }}
      YT_URLS: ${{ github.event.inputs.yt_urls }}
      YT_FORMAT: ${{ github.event.inputs.format }}
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Download Videos with Filtering
        shell: python
        run: |
          import os
          import subprocess
          import sys

          # הגדרת עוגיות
          cookies_content = os.getenv("YT_COOKIES")
          use_cookies = False
          if cookies_content and len(cookies_content) > 10:
              with open("cookies.txt", "w", encoding="utf-8") as f:
                  f.write(cookies_content)
              use_cookies = True
              print("✅ Cookies file created.")

          # רשימת חסימה: איברי מין וזמרות ספציפיות
          BLACKLIST = [
              # איברי מין וסלנג בוטה (עברית)
              "זין", "זיין", "שמוק", "כוס", "פות", "פותה", "דגדגן", "פין", "ביצים", "אשכים", "שק אשכים", 
              "פטמות", "פטמה", "שדיים", "ציצי", "תחת", "ישבן", "פי הטבעת", "אנאלי", "רקטום", "וגינה", 
              "שפיכה", "גמירה", "מציצה", "אוננות", "חדירה", "זרע", "פורנו", "סקס", "זנות", "זונה", 
              "זונות", "פרוצה", "עירום", "ערות", "חשפנות", "ביקיני", "חזיה", "תחתונים", "לנז'רי",
              # איברי מין וסלנג בוטה (אנגלית)
              "dick", "cock", "pussy", "vagina", "clit", "penis", "balls", "testicles", "anus", "anal", 
              "tits", "boobs", "nipples", "ass", "butt", "cum", "blowjob", "handjob", "porn", "xxx", "nude",
              # רשימת זמרות (שמות ספציפיים)
              "נועה קירל", "עדן בן זקן", "אנה זק", "אגם בוחבוט", "אודיה", "יסמין מועלם", "שרית חדד", 
              "מירי מסיקה", "קרן פלס", "נטע ברזילי", "ריטה", "נינט", "שירי מימון", "עדן גולן",
              "Taylor Swift", "Beyonce", "Rihanna", "Adele", "Billie Eilish", "Ariana Grande", "Dua Lipa"
          ]

          urls = os.getenv("YT_URLS", "").split(',')
          format_type = os.getenv("YT_FORMAT", "mp3")
          os.makedirs("yt_output", exist_ok=True)

          for url in urls:
              url = url.strip()
              if not url: continue
              try:
                  # בניית פקודה לבדיקת כותרת
                  check_cmd = ["yt-dlp", "--get-title", "--no-playlist"]
                  if use_cookies: check_cmd += ["--cookies", "cookies.txt"]
                  check_cmd.append(url)

                  title = subprocess.check_output(check_cmd).decode('utf-8', 'ignore').strip()
                  lower_title = title.lower()
                  
                  # בדיקת מילה אסורה
                  found_word = next((word for word in BLACKLIST if word.lower() in lower_title), None)
                  
                  if found_word:
                      print(f"❌ חסימה! הסרטון '{title}' נחסם בגלל המילה: '{found_word}'")
                      continue

                  print(f"✅ מוריד: {title}")
                  
                  # פקודת הורדה
                  dl_cmd = ["yt-dlp", "--no-playlist", "--no-restrict-filenames", "--windows-filenames", "-o", f"yt_output/%(title)s.%(ext)s"]
                  if use_cookies: dl_cmd += ["--cookies", "cookies.txt"]
                  
                  if format_type == "mp3":
                      dl_cmd += ["-x", "--audio-format", "mp3", "--embed-thumbnail", "--add-metadata", url]
                  else:
                      dl_cmd += ["-f", "bestvideo+bestaudio/best", "--merge-output-format", "mp4", "--embed-thumbnail", "--add-metadata", url]
                  
                  subprocess.run(dl_cmd)
              except Exception as e:
                  print(f"⚠️ שגיאה בעיבוד {url}: {e}")

      - name: 4. Process Output with Python
        id: process_files
        shell: python
        run: |
          import os
          import shutil
          source_dir = "yt_output"
          files = os.listdir(source_dir)
          if not files:
              print("No files found!")
              exit(1)
          if len(files) > 1:
              os.system("zip -r -j 'songs_collection.zip' yt_output/*")
              final = "songs_collection.zip"
          else:
              final = files[0]
              shutil.move(os.path.join(source_dir, final), final)
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"FINAL_ARTIFACT={final}\n")

      - name: 5. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.FINAL_ARTIFACT }}"
          tag: "v${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הקובץ מוכן."
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
