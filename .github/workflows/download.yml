name: "Smart Download: Single MP3 or ZIP"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישורים (מופרדים בפסיקים)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      # הגדרות שפה גלובליות לכל ה-Job
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONIOENCODING: utf-8
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 3. Download Videos
        run: |
          mkdir -p yt_output
          
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi

          FORMAT="${{ github.event.inputs.format }}"
          echo "${{ github.event.inputs.yt_urls }}" | tr ',' '\n' > urls.txt

          while IFS= read -r URL || [ -n "$URL" ]; do
            CLEAN_URL=$(echo "$URL" | xargs)
            [ -z "$CLEAN_URL" ] && continue
            
            # הדגש: --no-restrict-filenames ושימוש בקידוד UTF-8
            COMMON_ARGS="$COOKIE_ARG --no-playlist --no-restrict-filenames --windows-filenames --extractor-args youtube:player_client=android,web --js-runtimes node"
            
            if [ "$FORMAT" = "mp3" ]; then
              yt-dlp $COMMON_ARGS -x --audio-format mp3 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            else
              yt-dlp $COMMON_ARGS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata -o "yt_output/%(title)s.%(ext)s" "$CLEAN_URL"
            fi
          done < urls.txt

      - name: 4. Process Output with Python (Hebrew Support)
        id: process_files
        shell: python
        run: |
          import os
          import shutil

          # 1. טעינת רשימת הסינון
          bad_words = []
          if os.path.exists("filters.txt"):
              with open("filters.txt", "r", encoding="utf-8") as f:
                  bad_words = [line.strip().lower() for line in f if line.strip()]
          
          source_dir = "yt_output"
          all_files = os.listdir(source_dir)
          files_to_process = []

          # 2. סינון הקבצים
          for filename in all_files:
              # בדיקה אם אחת המילים האסורות נמצאת בשם הקובץ
              if any(bad_word in filename.lower() for bad_word in bad_words):
                  print(f"Skipping (filtered): {filename}")
                  os.remove(os.path.join(source_dir, filename))
              else:
                  files_to_process.append(filename)

          print(f"Remaining files: {files_to_process}")

          if len(files_to_process) == 0:
              print("No valid files found after filtering!")
              exit(1)

          # 3. יצירת ה-ZIP או טיפול בקובץ בודד
          if len(files_to_process) > 1:
              os.system("zip -r -j 'songs_collection.zip' yt_output/*")
              final_artifact = "songs_collection.zip"
          else:
              filename = files_to_process[0]
              shutil.move(os.path.join(source_dir, filename), filename)
              final_artifact = filename

          # כתיבה ל-GITHUB_ENV
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f"FINAL_ARTIFACT={final_artifact}\n")

      - name: 5. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.FINAL_ARTIFACT }}"
          tag: "v${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: "הורדה מוכנה. שם הקובץ: ${{ env.FINAL_ARTIFACT }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
